version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
  exclusions:
    paths:
      - internal/api

formatters:
  enable:
    - gofmt
